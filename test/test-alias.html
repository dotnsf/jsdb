<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSDB Column Alias Test</title>
    <script src="../jsdb.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        h1 {
            color: #333;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-section h2 {
            margin-top: 0;
            color: #0066cc;
        }
        .success {
            color: green;
            font-weight: bold;
        }
        .error {
            color: red;
            font-weight: bold;
        }
        .result {
            background-color: #f5f5f5;
            padding: 10px;
            margin: 10px 0;
            border-radius: 3px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        button {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0052a3;
        }
    </style>
</head>
<body>
    <h1>JSDB Column Alias (AS) Test</h1>
    
    <div class="test-section">
        <h2>Test 1: Simple column alias</h2>
        <button onclick="test1()">Run Test 1</button>
        <div id="result1" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Test 2: Multiple column aliases</h2>
        <button onclick="test2()">Run Test 2</button>
        <div id="result2" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Test 3: Aggregate function with alias</h2>
        <button onclick="test3()">Run Test 3</button>
        <div id="result3" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Test 4: Multiple aggregate functions with aliases</h2>
        <button onclick="test4()">Run Test 4</button>
        <div id="result4" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Test 5: GROUP BY with aggregate alias</h2>
        <button onclick="test5()">Run Test 5</button>
        <div id="result5" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Test 6: Mixed columns and aggregates with aliases</h2>
        <button onclick="test6()">Run Test 6</button>
        <div id="result6" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Run All Tests</h2>
        <button onclick="runAllTests()">Run All Tests</button>
    </div>

    <script>
        let db;

        async function initDB() {
            db = new JSDB('test_alias_db_' + Date.now());
        }

        async function test1() {
            const resultDiv = document.getElementById('result1');
            try {
                await initDB();
                
                await db.execute('CREATE TABLE users (id INTEGER, name TEXT, age INTEGER)');
                await db.execute("INSERT INTO users (id, name, age) VALUES (1, 'Alice', 25), (2, 'Bob', 30), (3, 'Charlie', 22)");
                
                const result = await db.execute('SELECT name AS user_name, age AS user_age FROM users');
                
                if (result.rows.length === 3 &&
                    result.rows[0].user_name === 'Alice' && result.rows[0].user_age === 25 &&
                    result.rows[1].user_name === 'Bob' && result.rows[1].user_age === 30 &&
                    !result.rows[0].hasOwnProperty('name') && !result.rows[0].hasOwnProperty('age')) {
                    resultDiv.innerHTML = '<span class="success">✓ Test 1 Passed</span>\n';
                    resultDiv.innerHTML += JSON.stringify(result.rows, null, 2);
                } else {
                    resultDiv.innerHTML = '<span class="error">✗ Test 1 Failed</span>\n';
                    resultDiv.innerHTML += 'Data verification failed\n';
                    resultDiv.innerHTML += JSON.stringify(result.rows, null, 2);
                }
            } catch (error) {
                resultDiv.innerHTML = '<span class="error">✗ Test 1 Failed</span>\n';
                resultDiv.innerHTML += 'Error: ' + error.message;
            }
        }

        async function test2() {
            const resultDiv = document.getElementById('result2');
            try {
                await initDB();
                
                await db.execute('CREATE TABLE products (id INTEGER, name TEXT, price REAL)');
                await db.execute("INSERT INTO products (id, name, price) VALUES (1, 'Apple', 1.5), (2, 'Banana', 0.8)");
                
                const result = await db.execute('SELECT id AS product_id, name AS product_name, price AS unit_price FROM products');
                
                if (result.rows.length === 2 &&
                    result.rows[0].product_id === 1 && result.rows[0].product_name === 'Apple' && result.rows[0].unit_price === 1.5 &&
                    !result.rows[0].hasOwnProperty('id') && !result.rows[0].hasOwnProperty('name') && !result.rows[0].hasOwnProperty('price')) {
                    resultDiv.innerHTML = '<span class="success">✓ Test 2 Passed</span>\n';
                    resultDiv.innerHTML += JSON.stringify(result.rows, null, 2);
                } else {
                    resultDiv.innerHTML = '<span class="error">✗ Test 2 Failed</span>\n';
                    resultDiv.innerHTML += 'Data verification failed\n';
                    resultDiv.innerHTML += JSON.stringify(result.rows, null, 2);
                }
            } catch (error) {
                resultDiv.innerHTML = '<span class="error">✗ Test 2 Failed</span>\n';
                resultDiv.innerHTML += 'Error: ' + error.message;
            }
        }

        async function test3() {
            const resultDiv = document.getElementById('result3');
            try {
                await initDB();
                
                await db.execute('CREATE TABLE users (id INTEGER, name TEXT, age INTEGER)');
                await db.execute("INSERT INTO users (id, name, age) VALUES (1, 'Alice', 25), (2, 'Bob', 30), (3, 'Charlie', 22)");
                
                const result = await db.execute('SELECT COUNT(*) AS total FROM users');
                
                if (result.rows.length === 1 &&
                    result.rows[0].total === 3 &&
                    !result.rows[0].hasOwnProperty('COUNT(*)')) {
                    resultDiv.innerHTML = '<span class="success">✓ Test 3 Passed</span>\n';
                    resultDiv.innerHTML += JSON.stringify(result.rows, null, 2);
                } else {
                    resultDiv.innerHTML = '<span class="error">✗ Test 3 Failed</span>\n';
                    resultDiv.innerHTML += 'Data verification failed\n';
                    resultDiv.innerHTML += JSON.stringify(result.rows, null, 2);
                }
            } catch (error) {
                resultDiv.innerHTML = '<span class="error">✗ Test 3 Failed</span>\n';
                resultDiv.innerHTML += 'Error: ' + error.message;
            }
        }

        async function test4() {
            const resultDiv = document.getElementById('result4');
            try {
                await initDB();
                
                await db.execute('CREATE TABLE sales (id INTEGER, product TEXT, amount REAL)');
                await db.execute("INSERT INTO sales (id, product, amount) VALUES (1, 'Apple', 150.5), (2, 'Banana', 80.0), (3, 'Apple', 200.0)");
                
                const result = await db.execute('SELECT COUNT(*) AS count, SUM(amount) AS total, AVG(amount) AS average FROM sales');
                
                if (result.rows.length === 1 &&
                    result.rows[0].count === 3 &&
                    result.rows[0].total === 430.5 &&
                    Math.abs(result.rows[0].average - 143.5) < 0.01 &&
                    !result.rows[0].hasOwnProperty('COUNT(*)') &&
                    !result.rows[0].hasOwnProperty('SUM(amount)') &&
                    !result.rows[0].hasOwnProperty('AVG(amount)')) {
                    resultDiv.innerHTML = '<span class="success">✓ Test 4 Passed</span>\n';
                    resultDiv.innerHTML += JSON.stringify(result.rows, null, 2);
                } else {
                    resultDiv.innerHTML = '<span class="error">✗ Test 4 Failed</span>\n';
                    resultDiv.innerHTML += 'Data verification failed\n';
                    resultDiv.innerHTML += JSON.stringify(result.rows, null, 2);
                }
            } catch (error) {
                resultDiv.innerHTML = '<span class="error">✗ Test 4 Failed</span>\n';
                resultDiv.innerHTML += 'Error: ' + error.message;
            }
        }

        async function test5() {
            const resultDiv = document.getElementById('result5');
            try {
                await initDB();
                
                await db.execute('CREATE TABLE sales (id INTEGER, product TEXT, amount REAL)');
                await db.execute("INSERT INTO sales (id, product, amount) VALUES (1, 'Apple', 150.5), (2, 'Banana', 80.0), (3, 'Apple', 200.0), (4, 'Orange', 120.0)");
                
                const result = await db.execute('SELECT product, COUNT(*) AS count, SUM(amount) AS total FROM sales GROUP BY product');
                
                if (result.rows.length === 3 &&
                    result.rows.some(r => r.product === 'Apple' && r.count === 2 && r.total === 350.5) &&
                    result.rows.some(r => r.product === 'Banana' && r.count === 1 && r.total === 80.0) &&
                    !result.rows[0].hasOwnProperty('COUNT(*)') &&
                    !result.rows[0].hasOwnProperty('SUM(amount)')) {
                    resultDiv.innerHTML = '<span class="success">✓ Test 5 Passed</span>\n';
                    resultDiv.innerHTML += JSON.stringify(result.rows, null, 2);
                } else {
                    resultDiv.innerHTML = '<span class="error">✗ Test 5 Failed</span>\n';
                    resultDiv.innerHTML += 'Data verification failed\n';
                    resultDiv.innerHTML += JSON.stringify(result.rows, null, 2);
                }
            } catch (error) {
                resultDiv.innerHTML = '<span class="error">✗ Test 5 Failed</span>\n';
                resultDiv.innerHTML += 'Error: ' + error.message;
            }
        }

        async function test6() {
            const resultDiv = document.getElementById('result6');
            try {
                await initDB();
                
                await db.execute('CREATE TABLE users (id INTEGER, name TEXT, age INTEGER)');
                await db.execute("INSERT INTO users (id, name, age) VALUES (1, 'Alice', 25), (2, 'Bob', 30), (3, 'Charlie', 22)");
                
                const result = await db.execute('SELECT name AS user_name, COUNT(*) AS total FROM users');
                
                if (result.rows.length === 1 &&
                    result.rows[0].total === 3 &&
                    !result.rows[0].hasOwnProperty('COUNT(*)')) {
                    resultDiv.innerHTML = '<span class="success">✓ Test 6 Passed</span>\n';
                    resultDiv.innerHTML += JSON.stringify(result.rows, null, 2);
                } else {
                    resultDiv.innerHTML = '<span class="error">✗ Test 6 Failed</span>\n';
                    resultDiv.innerHTML += 'Data verification failed\n';
                    resultDiv.innerHTML += JSON.stringify(result.rows, null, 2);
                }
            } catch (error) {
                resultDiv.innerHTML = '<span class="error">✗ Test 6 Failed</span>\n';
                resultDiv.innerHTML += 'Error: ' + error.message;
            }
        }

        async function runAllTests() {
            await test1();
            await new Promise(resolve => setTimeout(resolve, 500));
            await test2();
            await new Promise(resolve => setTimeout(resolve, 500));
            await test3();
            await new Promise(resolve => setTimeout(resolve, 500));
            await test4();
            await new Promise(resolve => setTimeout(resolve, 500));
            await test5();
            await new Promise(resolve => setTimeout(resolve, 500));
            await test6();
        }
    </script>
</body>
</html>
